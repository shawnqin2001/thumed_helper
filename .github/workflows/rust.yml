name: Rust Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PROJECT_NAME: thumed_helper

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Intel (x86_64)
          - os: macos-15-intel
            target: x86_64-apple-darwin

          # macOS Apple Silicon (arm64)
          - os: macos-14
            target: aarch64-apple-darwin

          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: rustfmt, clippy
          targets: ${{ matrix.target }}

      - name: Show Rust version
        run: rustc --version

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: List build artifacts
        run: |
          echo "Build target: ${{ matrix.target }}"
          ls -R target/${{ matrix.target }}/release

      - name: Package artifacts (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          zip -j ${{ env.PROJECT_NAME }}-${{ matrix.target }}.zip \
            target/${{ matrix.target }}/release/${{ env.PROJECT_NAME }}

      - name: Package artifacts (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/${{ env.PROJECT_NAME }}.exe `
            -DestinationPath ${{ env.PROJECT_NAME }}-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ matrix.target }}
          path: ${{ env.PROJECT_NAME }}-${{ matrix.target }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: ${{ env.PROJECT_NAME }}-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "artifacts/*"
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
